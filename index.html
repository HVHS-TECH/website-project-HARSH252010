<!DOCTYPE html>
<html>
<head>
<style>
.grid-container {
  background-color: #a7acac;
  padding: 10px;
  height: 908px;
  display: grid;
  grid-template-columns: auto auto auto auto;
  gap: 10px;
    grid-template-rows: 100px 100px auto;
  /* display, grid-template-columns, gap */
}

.grid-container > div {
  background-color: #f3f8fa;
  color: rgb(14, 13, 13);
  padding: 10px;
  text-align: center;
}
#box1{
  grid-column-start: 1;
  
  grid-template-columns: 80px 200px auto;
  grid-column-end: 1; 
}
#box2{
grid-column-start: 1;
grid-column-end: 5;
}
#box3{
  grid-column-start: 1;
  grid-column-end: 5;
}


 


</style>
</head>
<body>

<div class="grid-container">
  <div id=box1>1</div>
  <div id=box2>2</div>
  <div id=box3>3</div>
  <div>4</div>
  <div>5</div>
  <div>6</div>
  <div>7</div>
  <div>8</div>
 
</div>

</body>
</html>
