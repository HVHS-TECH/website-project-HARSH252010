` <!DOCTYPE html>
<html>
<head>
<style>
.grid-container {
  background-color: #588585;
  padding: 10px;
  min-height: 100vh;
  display: grid;
  grid-template-columns:  1fr 1fr 1fr 1fr;
  gap: 10px;
    grid-template-rows: auto auto auto auto;
  /* display, grid-template-columns, gap */
}

.grid-container > div {
  background-color: #dae0e2;
  color: rgb(14, 13, 13);
  padding: 10px;
  text-align: center;

  display: flex;
  flex-direction: column; 
  justify-content: center;
}

#box1{
  grid-column-start: 1;
   grid-column-end: 5; 
  
}
#box2{
grid-column-start: 1;
grid-column-end: 5;
}
#box3{
  grid-column-start: 1;
  grid-column-end: 5;
  height: 300px;
}
#box4{
  grid-column:1/2;
  grid-row:4;
  height: 240px;
  }

#box5{
  grid-column:2/3;
  grid-row:4;
  height: 240px;
}
#box6{
  grid-column:3/4;
  grid-row:4;
  height: 240px;
}
#box7{
  grid-column:4/5;
  grid-row:4;
  height: 240px;

}

img {
  width:100%;
  height:120px;
  object-fit: cover;
}

  
</style>
</head>
<body>

<div class="grid-container">
  <div id=box1>
    <div class="nav">
     <h3>My Car Site</h3>

     <ul>
      <li>Home</li>
      <li>Subaru</ul>
      <li>BMW</li>  
      <li>Contact</li>
     </ul>
   </div>
  </div> 
   
  <div id=box2><h2>Heading</h2></div>
  
  <div id=box3>
    <h3>Subaru vs BMW</h3>
  <p>This website compares Subaru vs BMW powerful car ever.</p>
  </div>
  <div id=box4><h4>Subaru</h4></div>
  <div id=box5><h4>Subaru engine</h4></div>
  <div id=box6><h4>BMW</h4></div>
  <div id=box7><h4>BMW engine</h4></div>

</div>


</body>
</html>
